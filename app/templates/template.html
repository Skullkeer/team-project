<!DOCTYPE html>
<head>
    <title>Chat Bots</title>
</head>
<body>
    <header>
        <h1>Welcome to the Chatbots</h1>
    </header>
    <form action="/" method="POST">
        <input type="text" name="user_input" placeholder="Type Something">
        <button type="submit">Send</button>
    </form>

    {% for bot_name, response in responses.items() %}
        <p>{{ bot_name }}: {{ response }}</p>
    {% endfor %}
